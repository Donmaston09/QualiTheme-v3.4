[theme]
primaryColor = "#1F77B4"
backgroundColor = "#FFFFFF"
secondaryBackgroundColor = "#F0F4F8"
textColor = "#2C3E50"
font = "sans serif"

[server]
maxUploadSize = 10
enableCORS = false
enableXsrfProtection = true

[browser]
gatherUsageStats = false

[runner]
# Ensures matplotlib uses the Agg (non-interactive) backend on Cloud.
# Prevents "cannot connect to X server" errors in headless environments.
magicEnabled = false
