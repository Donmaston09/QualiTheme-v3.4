# .streamlit/secrets.toml  ← RENAME THIS FILE
# DO NOT commit this file to version control.
# Add `.streamlit/secrets.toml` to your .gitignore.
#
# How to configure:
#   1. Rename this file to secrets.toml in .streamlit/
#   2. Fill in real values below
#   3. On Streamlit Cloud: paste each key/value into
#      App Settings → Secrets (no file needed)

# ── Stripe ────────────────────────────────────────────────────────────────────
# Secret key from Stripe Dashboard → Developers → API keys
STRIPE_API_KEY = "sk_live_..."

# Payment Link from Stripe Dashboard → Payments → Payment Links
# Configure the confirmation page to redirect to:
#   https://your-app.streamlit.app/?session_id={CHECKOUT_SESSION_ID}
STRIPE_PAYMENT_LINK = "https://buy.stripe.com/..."

# ── Optional: env-based Pro activation (for self-hosted / CI) ────────────────
# Set to "PRO" to bypass payment for internal/demo deployments.
# QUALITHEME_LICENSE = "PRO"
